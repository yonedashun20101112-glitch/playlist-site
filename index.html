<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Experience Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+JP:wght@300;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #0a0a0c; color: #e2e8f0; overflow-x: hidden; }
        .bg-glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(0,0,0,0) 70%); top: -200px; left: -200px; z-index: -1; animation: floating 12s infinite alternate ease-in-out; }
        .bg-glow-2 { position: fixed; width: 500px; height: 500px; background: radial-gradient(circle, rgba(236, 72, 153, 0.08) 0%, rgba(0,0,0,0) 70%); bottom: -100px; right: -100px; z-index: -1; animation: floating 15s infinite alternate-reverse ease-in-out; }
        @keyframes floating { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 40px) scale(1.1); } }
        .font-digital { font-family: 'Orbitron', sans-serif; }
        .music-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px rgba(255, 255, 255, 0.05) solid; }
        .music-card:hover { transform: translateY(-4px) scale(1.01); background: rgba(255, 255, 255, 0.06); border-color: rgba(236, 72, 153, 0.3); box-shadow: 0 12px 30px -10px rgba(236, 72, 153, 0.2); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="mb-12 text-center md:text-left flex flex-col md:flex-row justify-between items-center border-b border-zinc-800 pb-6 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">SOUND TRACKS OF MY LIFE</h1>
                <p class="text-zinc-400 text-sm mt-2">75分の通学路、登録と抹消のクロニクル</p>
            </div>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div class="bg-zinc-900/40 p-4 rounded-2xl border border-zinc-800/80 backdrop-blur-md">
                <p class="text-xs text-zinc-400 uppercase tracking-wider font-medium">総登録楽曲数</p>
                <p class="text-3xl font-bold font-digital text-white mt-1" id="stat-total">--</p>
                <span class="text-[10px] text-zinc-500">2025〜2026 累計</span>
            </div>
            <div class="bg-zinc-900/40 p-4 rounded-2xl border border-zinc-800/80 backdrop-blur-md">
                <p class="text-xs text-zinc-400 uppercase tracking-wider font-medium">現在聴いている曲</p>
                <p class="text-3xl font-bold font-digital text-emerald-400 mt-1" id="stat-active">--</p>
                <span class="text-[10px] text-emerald-400">プレイリスト内</span>
            </div>
            <div class="bg-zinc-900/40 p-4 rounded-2xl border border-zinc-800/80 backdrop-blur-md">
                <p class="text-xs text-zinc-400 uppercase tracking-wider font-medium">平均滞在期間</p>
                <p class="text-3xl font-bold font-digital text-purple-400 mt-1" id="stat-avg-days">-- <span class="text-sm text-zinc-400">Days</span></p>
                <span class="text-[10px] text-zinc-500">1曲あたりの平均期間</span>
            </div>
            <div class="bg-zinc-900/40 p-4 rounded-2xl border border-zinc-800/80 backdrop-blur-md">
                <p class="text-xs text-zinc-400 uppercase tracking-wider font-medium">最長ヘビロテ曲</p>
                <p class="text-sm font-bold text-zinc-200 mt-2 truncate" id="stat-longest-track">計算中...</p>
                <span class="text-[10px] text-zinc-500 truncate block" id="stat-longest-days">-- 日間</span>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-zinc-950/60 p-6 rounded-3xl border border-zinc-800/60">
                    <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-crown text-amber-400"></i> Top Artists
                    </h3>
                    <div class="space-y-3" id="artist-ranking-list">
                        <p class="text-zinc-500 text-xs text-center py-4">データ集計中...</p>
                    </div>
                </div>
            </div>
            
            <div class="lg:col-span-2">
                <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2"><i class="fa-solid fa-timeline text-pink-500"></i> 楽曲登録・抹消タイムライン</h3>
                <div class="space-y-3" id="tracks-container">
                    <div class="text-center text-zinc-500 py-12">データを読み込んでいます...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function parseCSV(text) {
            const lines = text.split(/\r\n|\n/);
            return lines.filter(line => line.trim() !== '').map(line => {
                const result = []; let current = ''; let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') { inQuotes = !inQuotes; } 
                    else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; } 
                    else { current += char; }
                }
                result.push(current.trim()); return result;
            });
        }

        function processCSVData(csvData, yearPrefix) {
            return csvData.map(row => {
                if (row.length < 2 || row[0] === 'Title' || row[0].startsWith('※') || row[0] === '2025' || row[0] === '2026') return null;
                if (!row[0] && !row[1]) return null;
                
                const title = row[0];
                const artist = row[1];
                const regDate = row[6] ? `${yearPrefix}/${row[6]}` : '--';
                let removedDate = row[7] || '';
                const days = parseInt(row[8]) || 0;
                const img = row[11] || '';
                const link = row[12] || '#';

                if (!removedDate || removedDate === '0' || removedDate.trim() === '') {
                    removedDate = (yearPrefix === '2025') ? '2026年へ継続' : '現在登録中';
                } else {
                    removedDate = `${yearPrefix}/${removedDate}`;
                }

                return { title, artist, regDate, removedDate, days, img, link, year: yearPrefix };
            }).filter(t => t !== null);
        }

        async function initDashboard() {
            let allTracks = [];
            
            // 提示していただいたリアルタイム公開URL
            const url2025 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSQt7m31X0JQZkoLr20fyqn8fB1w0dKqRNGVpj658i65YJbFV-_RsJbTxxE2CIUozwN2mTCclh6ePcz/pub?gid=0&single=true&output=csv";
            const url2026 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSQt7m31X0JQZkoLr20fyqn8fB1w0dKqRNGVpj658i65YJbFV-_RsJbTxxE2CIUozwN2mTCclh6ePcz/pub?gid=79005521&single=true&output=csv";
            
            try {
                // 1. 2025年のデータを直接スプレッドシートから取得
                try {
                    const res2025 = await fetch(url2025);
                    if (res2025.ok) {
                        const text2025 = await res2025.text();
                        allTracks = allTracks.concat(processCSVData(parseCSV(text2025), '2025'));
                    }
                } catch(e) { console.log("2025データ取得失敗", e); }

                // 2. 2026年のデータを直接スプレッドシートから取得
                const res2026 = await fetch(url2026);
                if (!res2026.ok) throw new Error('スプレッドシート（2026）の通信に失敗しました。');
                const text2026 = await res2026.text();
                allTracks = allTracks.concat(processCSVData(parseCSV(text2026), '2026'));

                // 3. 統計の計算
                document.getElementById('stat-total').innerText = allTracks.length;
                document.getElementById('stat-active').innerText = allTracks.filter(t => t.removedDate === '現在登録中').length;
                
                const dayTracks = allTracks.filter(t => t.days > 0);
                document.getElementById('stat-avg-days').innerText = dayTracks.length > 0 ? (dayTracks.reduce((sum, t) => sum + t.days, 0) / dayTracks.length).toFixed(1) : '--';
                
                let longest = { title: '--', artist: '--', days: 0 };
                allTracks.forEach(t => { if (t.days > longest.days) longest = t; });
                document.getElementById('stat-longest-track').innerText = longest.title;
                document.getElementById('stat-longest-days').innerText = longest.days + ' 日間';

                // 4. アーティストランキング
                const artistCounts = {};
                allTracks.forEach(t => { if(t.artist) artistCounts[t.artist] = (artistCounts[t.artist] || 0) + 1; });
                const topArtists = Object.entries(artistCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
                
                document.getElementById('artist-ranking-list').innerHTML = topArtists.map(([name, count], index) => `
                    <div class="flex justify-between items-center bg-zinc-900/30 p-2.5 rounded-xl border border-zinc-800/40 text-sm">
                        <div class="flex items-center gap-3">
                            <span class="font-digital font-bold text-xs ${index === 0 ? 'text-amber-400' : index === 1 ? 'text-zinc-400' : 'text-zinc-600'}">0${index+1}</span>
                            <span class="text-zinc-200 font-medium truncate max-w-[140px]">${name}</span>
                        </div>
                        <span class="text-xs font-digital text-zinc-500">${count} tracks</span>
                    </div>
                `).join('');

                // 5. タイムライン表示
                const container = document.getElementById('tracks-container');
                container.innerHTML = '';
                
                [...allTracks].reverse().forEach(track => {
                    const defaultImg = 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=120&auto=format&fit=crop';
                    const imgUrl = track.img && track.img.startsWith('http') ? track.img : defaultImg;
                    
                    let removeStatus = '';
                    if (track.removedDate === '現在登録中') {
                        removeStatus = `<span class="text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded text-[10px]">Active</span>`;
                    } else if (track.removedDate === '2026年へ継続') {
                        removeStatus = `<span class="text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded text-[10px]">2026継続</span>`;
                    } else {
                        removeStatus = `<span class="text-zinc-500">${track.removedDate} 抹消</span>`;
                    }

                    container.innerHTML += `
                        <div class="music-card p-4 rounded-2xl flex items-center justify-between gap-4">
                            <div class="flex items-center gap-4 min-w-0">
                                <img src="${imgUrl}" class="w-12 h-12 rounded-xl object-cover flex-shrink-0 border border-zinc-800 shadow-md">
                                <div class="min-w-0">
                                    <h4 class="text-white font-bold truncate text-sm md:text-base">${track.title}</h4>
                                    <p class="text-zinc-400 text-xs truncate">${track.artist}</p>
                                    <div class="flex items-center gap-2 mt-1 text-[11px] text-zinc-500">
                                        <span>${track.regDate} 登録</span>
                                        <span>•</span>
                                        <span>${removeStatus}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-3 flex-shrink-0">
                                <div class="text-right hidden sm:block">
                                    <span class="text-[10px] text-zinc-500 block uppercase">Duration</span>
                                    <span class="font-digital text-sm text-indigo-400 font-bold">${track.days > 0 ? track.days + ' 日' : 'Active'}</span>
                                </div>
                                <a href="${track.link}" target="_blank" class="w-9 h-9 rounded-full bg-zinc-900 hover:bg-pink-600 border border-zinc-800 hover:border-transparent text-zinc-400 hover:text-white flex items-center justify-center transition-all shadow-md">
                                    <i class="fa-solid fa-play text-xs ml-0.5"></i>
                                </a>
                            </div>
                        </div>`;
                });

            } catch (error) {
                document.getElementById('tracks-container').innerHTML = `<div class="text-center text-red-400 py-12">エラー: ${error.message}</div>`;
            }
        }
        window.onload = initDashboard;
    </script>
</body>
</html>
