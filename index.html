<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週間楽曲</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link rel="icon" href="favicon.png">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background:#f5f5f7;
  color:#111;
}

header{
  padding:34px 20px;
  color:white;
  display:flex;
  align-items:center;
  gap:12px;
  background:linear-gradient(135deg,#ff2d55,#ff5e3a,#ffcc00);
}

header.bg2025{
  background-image:
    linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.35)),
    url("header2025.jpg");
  background-size:cover;
  background-position:center;
}

.logo{
  height:48px;
  width:48px;
  border-radius:12px;
  object-fit:cover;
}

h1{margin:0;font-size:34px}
.sub{opacity:.9;margin-top:6px}

nav{
  display:flex;
  gap:8px;
  overflow:auto;
  padding:14px;
  background:white;
  position:sticky;
  top:0;
  z-index:10;
  border-bottom:1px solid #ddd;
}

button{
  border:0;
  border-radius:999px;
  padding:10px 15px;
  background:#eee;
  font-weight:800;
  cursor:pointer;
  white-space:nowrap;
}

button.active{
  background:#ff2d55;
  color:white;
}

main{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.section{display:none}
.section.active{display:block}

.tableWrap{
  overflow-x:auto;
  background:white;
  border-radius:18px;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
}

table{
  width:100%;
  min-width:780px;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:left;
  font-size:14px;
}

th{background:#fafafa}

.songBtn{
  background:none;
  padding:0;
  border-radius:0;
  color:#ff2d55;
  font-weight:900;
  text-align:left;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}

.card{
  background:white;
  border-radius:22px;
  padding:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
  position:relative;
}

.rankNum{
  position:absolute;
  top:12px;
  right:14px;
  font-size:32px;
  font-weight:900;
  color:#ff2d55;
  background:rgba(255,255,255,.9);
  padding:4px 10px;
  border-radius:999px;
}

.rank1{font-size:44px;color:#ffcc00}
.rank2{font-size:40px;color:#999}
.rank3{font-size:36px;color:#cd7f32}

.cover{
  width:100%;
  aspect-ratio:1/1;
  border-radius:18px;
  background:linear-gradient(135deg,#ff2d55,#ffcc00);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:42px;
  font-weight:900;
  margin-bottom:14px;
  overflow:hidden;
}

.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.title{font-size:18px;font-weight:900}
.artist{color:#666;margin-top:4px}

.months{
  margin-top:8px;
  color:#555;
  font-size:14px;
  font-weight:700;
}

.days{
  margin-top:10px;
  font-weight:900;
  color:#ff2d55;
}

.tags{
  margin-top:10px;
  display:flex;
  gap:6px;
  flex-wrap:nowrap;
  overflow-x:auto;
  white-space:nowrap;
}

.tagIcon{
  width:30px;
  height:30px;
  min-width:30px;
  border-radius:50%;
  border:0;
  background:#f1f1f1;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-size:16px;
  cursor:pointer;
  padding:0;
}

.tagIcon img{
  width:100%;
  height:100%;
  object-fit:cover;
}

a.music{
  display:inline-block;
  margin-top:12px;
  padding:9px 12px;
  border-radius:999px;
  background:#ff2d55;
  color:white;
  text-decoration:none;
  font-weight:900;
  font-size:13px;
}

input{
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  width:260px;
  max-width:80%;
  font-size:16px;
}

.searchBox{margin-bottom:18px}

#detail{
  margin-top:22px;
}

.note{
  margin-top:10px;
  color:#777;
  font-size:13px;
  line-height:1.5;
}

.artistList{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:20px;
  max-height:300px;
  overflow-y:auto;
}

.artistBtn{
  background:white;
  color:#111;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.artistBtn:hover{
  background:#ff2d55;
  color:white;
}

.dashboardHero{
  background:linear-gradient(135deg,#111,#ff2d55,#ff9500);
  color:white;
  border-radius:28px;
  padding:26px;
  margin-bottom:22px;
  box-shadow:0 12px 30px rgba(0,0,0,.18);
}

.dashboardHero h2{
  margin:0;
  font-size:34px;
}

.dashboardHero p{
  opacity:.9;
  margin-bottom:0;
}

.dashboardStats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:14px;
  margin:18px 0 26px;
}

.statBox{
  background:white;
  border-radius:20px;
  padding:18px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.statLabel{
  color:#666;
  font-weight:800;
  font-size:13px;
}

.statNum{
  font-size:34px;
  font-weight:900;
  color:#ff2d55;
  margin-top:6px;
}

.pageButtons{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:18px;
}

.pageButtons button{
  background:rgba(255,255,255,.2);
  color:white;
  backdrop-filter:blur(8px);
}

.pageButtons button:hover{
  background:white;
  color:#ff2d55;
}

.miniGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:12px;
}

.miniCard{
  background:white;
  border-radius:18px;
  padding:10px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.miniCover{
  width:100%;
  aspect-ratio:1/1;
  border-radius:14px;
  background:linear-gradient(135deg,#ff2d55,#ffcc00);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:900;
  font-size:26px;
  overflow:hidden;
}

.miniCover img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.miniTitle{
  margin-top:8px;
  font-weight:900;
  font-size:13px;
}

.miniArtist{
  color:#666;
  font-size:12px;
  margin-top:2px;
}

.monthlyGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
}

@media(max-width:600px){
  header{padding:26px 18px}
  h1{font-size:28px}
  main{padding:14px}
  .grid{grid-template-columns:1fr}
  .miniGrid{grid-template-columns:repeat(2,1fr)}
  th,td{font-size:13px;padding:10px}
  button{font-size:13px;padding:9px 12px}
  .dashboardHero{padding:22px}
  .dashboardHero h2{font-size:28px}
}
</style>
</head>

<body>
<header id="mainHeader">
  <img src="logo.png" class="logo" alt="logo">
  <div>
    <h1>週間楽曲</h1>
    <div class="sub">since 2025</div>
  </div>
</header>

<nav>
  <button data-target="dashboard" onclick="show('dashboard', this)" class="active">ダッシュボード</button>
  <button data-target="table2025" onclick="show('table2025', this)">2025表</button>
  <button data-target="table2026" onclick="show('table2026', this)">2026表</button>
  <button data-target="rank2025" onclick="show('rank2025', this)">2025ランキング</button>
  <button data-target="rank2026" onclick="show('rank2026', this)">2026ランキング</button>
  <button data-target="rankAll" onclick="show('rankAll', this)">累計ランキング</button>
  <button data-target="monthly" onclick="show('monthly', this)">月別集計</button>
  <button data-target="cards" onclick="show('cards', this)">カード検索</button>
  <button data-target="search" onclick="show('search', this)">日程検索</button>
  <button data-target="artists" onclick="show('artists', this)">アーティスト</button>
</nav>

<main>
  <section id="dashboard" class="section active"></section>
  <section id="table2025" class="section"></section>
  <section id="table2026" class="section"></section>
  <section id="rank2025" class="section"></section>
  <section id="rank2026" class="section"></section>
  <section id="rankAll" class="section"></section>
  <section id="monthly" class="section"></section>

  <section id="cards" class="section">
    <h2>曲検索</h2>
    <div class="searchBox">
      <input id="songSearchInput" placeholder="曲名・アーティストで検索" oninput="searchSong()">
      <button onclick="searchSong()">検索</button>
    </div>
    <div id="songSearchResult" class="grid"></div>
  </section>

  <section id="search" class="section">
    <h2>日程検索</h2>
    <div class="searchBox">
      <input id="dateInput" placeholder="例：2025/04/28">
      <button onclick="searchDate()">検索</button>
    </div>
    <div id="searchResult" class="grid"></div>
  </section>

  <section id="artists" class="section">
    <h2>アーティスト検索</h2>
    <div class="searchBox">
      <input id="artistSearchInput" placeholder="アーティスト名で検索" oninput="renderArtists()">
    </div>
    <div id="artistList"></div>
    <div id="artistResult" class="grid"></div>
  </section>

  <section id="detail"></section>
</main>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/1xGzpQzVBjp40YdD1y5tkdy3AR6XwJNypWOUQkEgzRTw/gviz/tq?tqx=out:csv&sheet=all";

const tagIcons = {
  anime: "icons/anime.png",
  weekly: "icons/weekly.png",
  karaoke: "icons/karaoke.png",
  repeat: "icons/repeat.png"
};

let songs = [];

function show(id, btn=null){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  const activeBtn = btn || document.querySelector(`nav button[data-target="${id}"]`);
  if(activeBtn) activeBtn.classList.add("active");

  document.getElementById("detail").innerHTML = "";

  const header = document.getElementById("mainHeader");
  header.classList.remove("bg2025");

  if(id === "table2025" || id === "rank2025"){
    header.classList.add("bg2025");
  }
}

function clean(v){
  return (v || "").replace(/^"|"$/g,"").trim();
}

function parseDate(v){
  const x = clean(v).replaceAll("-","/");
  const m = x.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  if(!m) return null;
  return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
}

function toDate(v){
  return parseDate(v) || new Date("2099-12-31");
}

function yearOf(s){
  return clean(s.start).slice(0,4);
}

function shortDate(v){
  const x = clean(v).replaceAll("-","/");
  const m = x.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  return m ? `${String(m[2]).padStart(2,"0")}/${String(m[3]).padStart(2,"0")}` : x;
}

function monthLabel(s){
  const x = clean(s.start).replaceAll("-","/");
  const m = x.match(/^(\d{4})\/(\d{1,2})\/\d{1,2}$/);
  return m ? `${m[1]}/${String(m[2]).padStart(2,"0")}` : "";
}

function ym(dateStr){
  const x = clean(dateStr).replaceAll("-","/");
  const m = x.match(/^(\d{4})\/(\d{1,2})\/\d{1,2}$/);
  return m ? `${m[1]}/${String(m[2]).padStart(2,"0")}` : "";
}

function getTags(row){
  const tagCells = [row[2], row[3], row[4], row[5]].map(clean);
  const tags = [];

  if(tagCells.includes("ア")) tags.push({key:"anime", label:"アニメ", fallback:"📺"});
  if(tagCells.includes("週")) tags.push({key:"weekly", label:"週間選出楽曲", fallback:"⭐"});
  if(tagCells.includes("カ")) tags.push({key:"karaoke", label:"カラオケ曲", fallback:"🎤"});
  if(tagCells.includes("リ")) tags.push({key:"repeat", label:"リピート曲", fallback:"🔁"});

  return tags;
}

function tagHtml(tags){
  return tags.map(t=>{
    const src = tagIcons[t.key];
    return `
      <button class="tagIcon" title="${t.label}" onclick="filterByTag('${t.key}')">
        ${src ? `<img src="${src}" alt="${t.label}" onerror="this.replaceWith(document.createTextNode('${t.fallback}'))">` : t.fallback}
      </button>
    `;
  }).join("");
}

function appleLink(song){
  return "https://music.apple.com/jp/search?term=" + encodeURIComponent(song.title + " " + song.artist);
}

function displayMonths(song){
  const same = songs.filter(s=>s.title === song.title && s.artist === song.artist);
  const months = [...new Set(same.map(monthLabel).filter(Boolean))];

  if(months.length >= 4){
    return `${months[0]}, ${months[1]}, ${months[2]}他`;
  }
  return months.join(", ");
}

function card(song, rank=null, showDays=false){
  let rankClass = "";
  if(rank===1) rankClass = "rank1";
  if(rank===2) rankClass = "rank2";
  if(rank===3) rankClass = "rank3";

  return `
  <div class="card">
    ${rank ? `<div class="rankNum ${rankClass}">#${rank}</div>` : ""}
    <div class="cover">${song.cover ? `<img src="${song.cover}">` : song.title[0]}</div>
    <div class="title">${song.title}</div>
    <div class="artist">${song.artist}</div>
    <div class="months">${displayMonths(song)}登録</div>
    ${showDays ? `<div class="days">${song.days}日</div>` : ""}
    ${song.note ? `<div class="note">${song.note}</div>` : ""}
    <div class="tags">${tagHtml(song.tags)}</div>
    <a class="music" href="${song.apple || appleLink(song)}" target="_blank">Apple Musicで開く</a>
  </div>`;
}

function miniCard(song){
  return `
    <div class="miniCard">
      <div class="miniCover">${song.cover ? `<img src="${song.cover}">` : song.title[0]}</div>
      <div class="miniTitle">${song.title}</div>
      <div class="miniArtist">${song.artist}</div>
    </div>
  `;
}

function showSongCard(rawIndex){
  const song = songs.find(s => s.rawIndex === rawIndex);
  if(!song) return;

  document.getElementById("detail").innerHTML =
    `<h2>選択した曲</h2><div class="grid">${card(song)}</div>`;

  document.getElementById("detail").scrollIntoView({behavior:"smooth"});
}

function makeTable(year){
  const data = songs.filter(s=>yearOf(s)==year);

  return `
  <h2>${year}年 登録・抹消表</h2>
  <div class="tableWrap">
  <table>
    <tr>
      <th>曲名</th>
      <th>アーティスト</th>
      <th>追加日</th>
      <th>抹消日</th>
      <th>登録期間</th>
      <th>過去登録回数</th>
      <th>タグ</th>
    </tr>
    ${data.map(s=>`
      <tr>
        <td><button class="songBtn" onclick="showSongCard(${s.rawIndex})">${s.title}</button></td>
        <td>${s.artist}</td>
        <td>${shortDate(s.start)}</td>
        <td>${s.end ? shortDate(s.end) : "現在"}</td>
        <td>${s.days}日</td>
        <td>${s.pastCount}</td>
        <td><div class="tags">${tagHtml(s.tags)}</div></td>
      </tr>`).join("")}
  </table>
  </div>`;
}

function mergeSongs(data){
  const map = {};

  data.forEach(s=>{
    const key = `${s.title}__${s.artist}`;

    if(!map[key]){
      map[key] = {
        ...s,
        days:0,
        tags:[...s.tags],
        cover:s.cover,
        apple:s.apple,
        note:s.note
      };
    }

    map[key].days += Number(s.days || 0);
    map[key].tags = [...new Map([...map[key].tags, ...s.tags].map(t=>[t.key,t])).values()];
    if(!map[key].cover && s.cover) map[key].cover = s.cover;
    if(!map[key].apple && s.apple) map[key].apple = s.apple;
    if(!map[key].note && s.note) map[key].note = s.note;
  });

  return Object.values(map);
}

function ranking(year=null){
  let data = year ? songs.filter(s=>yearOf(s)==year) : mergeSongs(songs);

  data = [...data].sort((a,b)=>Number(b.days)-Number(a.days));

  const top5 = data.slice(0,5);
  const rest25 = data.slice(5,30);

  const artistMap = {};
  data.forEach(s=>{
    artistMap[s.artist] = (artistMap[s.artist]||0) + Number(s.days||0);
  });

  const artistRank = Object.entries(artistMap)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,20);

  return `
    <h2>${year || "累計"} 登録日数ランキング TOP5</h2>
    <div class="grid">${top5.map((s,i)=>card(s,i+1,true)).join("")}</div>

    <h2>6位〜30位</h2>
    <div class="tableWrap">
      <table>
        <tr><th>順位</th><th>曲名</th><th>アーティスト</th><th>日数</th></tr>
        ${rest25.map((s,i)=>`
          <tr>
            <td>${i+6}</td>
            <td>${s.title}</td>
            <td>${s.artist}</td>
            <td>${s.days}日</td>
          </tr>
        `).join("")}
      </table>
    </div>

    <h2>アーティスト別ランキング</h2>
    <div class="tableWrap">
      <table>
        <tr><th>順位</th><th>アーティスト</th><th>合計日数</th></tr>
        ${artistRank.map((a,i)=>`
          <tr>
            <td>${i+1}</td>
            <td><button class="songBtn" onclick="filterByArtist('${String(a[0]).replaceAll("'","\\'")}')">${a[0]}</button></td>
            <td>${a[1]}日</td>
          </tr>
        `).join("")}
      </table>
    </div>
  `;
}

function monthlyStats(year=null){
  const data = year ? songs.filter(s=>yearOf(s) === year) : songs;
  const map = {};

  data.forEach(s=>{
    const addMonth = ym(s.start);
    const removeMonth = ym(s.end);

    if(addMonth){
      if(!map[addMonth]) map[addMonth] = {add:0, remove:0};
      map[addMonth].add++;
    }

    if(removeMonth){
      if(!map[removeMonth]) map[removeMonth] = {add:0, remove:0};
      map[removeMonth].remove++;
    }
  });

  const rows = Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));

  return `
    <div>
    <h2>${year || "累計"} 月別追加・抹消曲数</h2>
    <div class="tableWrap">
      <table>
        <tr>
          <th>月</th>
          <th>追加曲数</th>
          <th>抹消曲数</th>
        </tr>
        ${rows.map(([month,v])=>`
          <tr>
            <td>${month}</td>
            <td>${v.add}</td>
            <td>${v.remove}</td>
          </tr>
        `).join("")}
      </table>
    </div>
    </div>
  `;
}

function monthlyPage(){
  return `
    <div class="monthlyGrid">
      ${monthlyStats("2025")}
      ${monthlyStats("2026")}
      ${monthlyStats()}
    </div>
  `;
}

function dashboard(){
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,"0");
  const currentYM = `${y}/${m}`;

  const added = songs.filter(s=>ym(s.start) === currentYM).length;
  const removed = songs.filter(s=>ym(s.end) === currentYM).length;

  const today = new Date();
  const activeSongs = songs.filter(s=>{
    const st = parseDate(s.start);
    const en = s.end ? parseDate(s.end) : new Date(2099,11,31);
    return st && st <= today && today <= en;
  });

  return `
    <div class="dashboardHero">
      <h2>Dashboard</h2>
      <p>${currentYM} の登録・抹消状況</p>
      <div class="pageButtons">
        <button onclick="show('table2025')">2025表</button>
        <button onclick="show('table2026')">2026表</button>
        <button onclick="show('rankAll')">累計ランキング</button>
        <button onclick="show('monthly')">月別集計</button>
        <button onclick="show('cards')">曲検索</button>
        <button onclick="show('artists')">アーティスト</button>
      </div>
    </div>

    <div class="dashboardStats">
      <div class="statBox">
        <div class="statLabel">今月の登録曲数</div>
        <div class="statNum">${added}</div>
      </div>
      <div class="statBox">
        <div class="statLabel">今月の抹消曲数</div>
        <div class="statNum">${removed}</div>
      </div>
      <div class="statBox">
        <div class="statLabel">現在登録中</div>
        <div class="statNum">${activeSongs.length}</div>
      </div>
    </div>

    <h2>現在登録中の曲</h2>
    <div class="miniGrid">
      ${activeSongs.map(miniCard).join("") || "現在登録中の曲がありません"}
    </div>
  `;
}

function searchDate(){
  const input = document.getElementById("dateInput").value.trim();
  const target = parseDate(input);

  if(!target){
    document.getElementById("searchResult").innerHTML = "日付を 2025/04/28 の形式で入力してください";
    return;
  }

  const result = songs.filter(s=>{
    const st = parseDate(s.start);
    const en = s.end ? parseDate(s.end) : new Date(2099,11,31);
    return st && st <= target && target <= en;
  });

  document.getElementById("searchResult").innerHTML =
    result.length ? result.map(s=>card(s)).join("") : "該当なし";
}

function searchSong(){
  const keyword = document.getElementById("songSearchInput").value.trim().toLowerCase();

  if(!keyword){
    document.getElementById("songSearchResult").innerHTML = "";
    return;
  }

  const merged = mergeSongs(songs);

  const result = merged.filter(s=>{
    return (
      s.title.toLowerCase().includes(keyword) ||
      s.artist.toLowerCase().includes(keyword)
    );
  });

  document.getElementById("songSearchResult").innerHTML =
    result.length ? result.map(s=>card(s)).join("") : "該当なし";
}

function filterByTag(tagKey){
  show("cards");

  const merged = mergeSongs(songs);
  const result = merged.filter(s=>s.tags.some(t=>t.key === tagKey));

  document.getElementById("songSearchInput").value = "";
  document.getElementById("songSearchResult").innerHTML =
    result.length ? result.map(s=>card(s)).join("") : "該当なし";
}

function kanaKey(name){
  return name.normalize("NFKC").toLowerCase();
}

function renderArtists(){
  const input = document.getElementById("artistSearchInput");
  const keyword = input ? input.value.trim().toLowerCase() : "";

  const artists = [...new Set(songs.map(s=>s.artist).filter(Boolean))]
    .sort((a,b)=>kanaKey(a).localeCompare(kanaKey(b), "ja"));

  const filtered = artists.filter(a=>a.toLowerCase().includes(keyword));

  document.getElementById("artistList").innerHTML =
    `<div class="artistList">
      ${filtered.map(a=>`
        <button class="artistBtn" onclick="filterByArtist('${a.replaceAll("'","\\'")}')">${a}</button>
      `).join("")}
    </div>`;
}

function filterByArtist(artist){
  show("artists");

  const merged = mergeSongs(songs);
  const result = merged.filter(s=>s.artist === artist);

  document.getElementById("artistResult").innerHTML =
    `<h2>${artist}</h2>` +
    (result.length ? result.map(s=>card(s)).join("") : "該当なし");
}

fetch(csvUrl)
.then(res=>res.text())
.then(csv=>{
  const rows = Papa.parse(csv,{skipEmptyLines:true}).data;

  songs = rows.map((row)=>({
    title: clean(row[0]),
    artist: clean(row[1]),
    start: clean(row[6]),
    end: clean(row[7]),
    days: clean(row[8]) || 0,
    note: clean(row[10]),
    tags: getTags(row),
    cover: row.find(c=>String(c).includes("http") && String(c).match(/\.(jpg|png|webp)/)),
    apple: row.find(c=>String(c).includes("music.apple.com")),
    rawIndex:null
  })).filter(s=>s.title && s.start);

  songs.forEach((s,i)=>{
    s.rawIndex = i;
    s.pastCount = songs
      .slice(0,i)
      .filter(x=>x.title===s.title && x.artist===s.artist)
      .length;
  });

  document.getElementById("dashboard").innerHTML = dashboard();
  document.getElementById("table2025").innerHTML = makeTable("2025");
  document.getElementById("table2026").innerHTML = makeTable("2026");
  document.getElementById("rank2025").innerHTML = ranking("2025");
  document.getElementById("rank2026").innerHTML = ranking("2026");
  document.getElementById("rankAll").innerHTML = ranking();
  document.getElementById("monthly").innerHTML = monthlyPage();
  renderArtists();
});
</script>
