function parseDate(s){if(!s||s==='Active'||s==='--')return null;const p=String(s).replace(/-/g,'/').split('/');return p.length>=3?new Date(+p[0],+p[1]-1,+p[2]):null}function mmdd(v){if(!v)return'';const s=String(v).trim().replace(/-/g,'/');if(!s||s==='0')return'';if(/^\d{1,2}\/\d{1,2}$/.test(s)){const p=s.split('/');return p[0].padStart(2,'0')+'/'+p[1].padStart(2,'0')}const p=s.split('/');return p.length>=3?p[p.length-2].padStart(2,'0')+'/'+p[p.length-1].padStart(2,'0'):s}function normSeason(s){return String(s||'').trim().replace(/^第\s*([0-9０-９一二三四五六七八九十]+)\s*期$/,(_,n)=>'Season'+n).replace(/^season/i,'Season')}function dedupeAnime(list){const seen=new Set();return list.map(a=>({...a,season:normSeason(a.season)})).filter(a=>{const k=animeKey(a);if(seen.has(k))return false;seen.add(k);return true})}
async function getText(url){const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw new Error('通信失敗');return await r.text()}function showLoad(on,msg='ロード中...'){$('loadingText').textContent=msg;$('loading').classList.toggle('hidden',!on)}function cover(img){return img&&img!=='0'?`<img src="${esc(img)}" class="w-11 h-11 rounded-lg object-cover border border-zinc-800 flex-shrink-0">`:`<div class="w-11 h-11 rounded-lg bg-zinc-950 flex items-center justify-center border border-zinc-900 flex-shrink-0"><i class="fa-solid fa-music text-zinc-700 text-xs"></i></div>`}function animePoster(name){const u=animeImg[name];return u?`<img src="${esc(u)}" class="poster" loading="lazy">`:`<div class="poster no-poster"><i class="fa-solid fa-tv"></i></div>`}function play(url){return url&&url!=='#'?`<a href="${esc(url)}" target="_blank" onclick="event.stopPropagation()" class="btn inline-flex items-center justify-center gap-2 w-full py-3 rounded-xl text-sm font-black text-pink-200 bg-pink-500/15 border border-pink-500/30"><i class="fa-solid fa-play"></i> 楽曲リンクを開く</a>`:`<span class="inline-flex items-center justify-center gap-2 w-full py-3 rounded-xl text-sm font-bold text-zinc-600 bg-zinc-900/40 border border-zinc-900"><i class="fa-solid fa-link-slash"></i> リンク未登録</span>`}
function buildTracks(c25,c26){const parse=(text,year)=>csv(text).slice(1).map((r,i)=>{const title=String(r[0]||'').trim(),artist=String(r[1]||'').trim();if(!title&&!artist)return null;if(['Title','楽曲名','2025','2026'].includes(title)||title.startsWith('※'))return null;const reg=mmdd(r[6]),rem=mmdd(r[7]);let days=parseInt(r[8],10)||0;const regDate=reg?`${year}/${reg}`:'--',removedDate=rem?`${year}/${rem}`:'Active';if(removedDate==='Active'&&reg){const d=parseDate(regDate);days=Math.max(2,d?Math.ceil((new Date()-d)/86400000):2)}return{year,title,artist,rawReg:reg,rawRem:rem||'Active',regDate,removedDate,days:Math.max(2,days),img:String(r[11]||'').trim(),link:String(r[12]||'#').trim(),sourceIndex:i+2}}).filter(Boolean);tracks=[...parse(c25,'2025'),...parse(c26,'2026')];rebuildMasters()}function rebuildMasters(){const imgs={},links={},map={};tracks.forEach(t=>{const k=songKey(t.title,t.artist);if(t.img&&t.img!=='0')imgs[k]=t.img;if(t.link&&t.link!=='#')links[k]=t.link});tracks.forEach(t=>{const k=songKey(t.title,t.artist);if(imgs[k])t.img=imgs[k];if(links[k])t.link=links[k];if(t.removedDate==='Active'){const d=parseDate(t.regDate);t.days=Math.max(2,d?Math.ceil((new Date()-d)/86400000):2)}if(!map[k])map[k]={title:t.title,artist:t.artist,img:t.img,link:t.link,totalDays:0,history:[]};map[k].history.push(t);map[k].totalDays+=t.days});masters=Object.values(map);renderStats()}function buildAnime(text){animeLinks=dedupeAnime(csv(text).slice(1).map(r=>({title:String(r[0]||'').trim(),artist:String(r[1]||'').trim(),anime:String(r[2]||'').trim(),season:String(r[3]||'').trim(),type:String(r[4]||'').trim()})).filter(a=>a.title&&a.artist&&a.anime));localStorage.setItem('animeLinks',JSON.stringify(animeLinks))}function getAnime(title,artist){return dedupeAnime(animeLinks.filter(a=>songKey(a.title,a.artist)===songKey(title,artist)))}function animeGroups(){const rows=dedupeAnime(animeLinks).map(a=>{const m=masters.find(x=>songKey(x.title,x.artist)===songKey(a.title,a.artist));return{...a,totalDays:m?m.totalDays:0}});const g={};rows.forEach(a=>{if(!g[a.anime])g[a.anime]={anime:a.anime,items:[],days:0,ops:0,eds:0};g[a.anime].items.push(a);g[a.anime].days+=a.totalDays;if(a.type==='OP')g[a.anime].ops++;if(a.type==='ED')g[a.anime].eds++});return Object.values(g).sort((a,b)=>b.days-a.days||b.items.length-a.items.length)}
async function init(){showLoad(true,'スプレッドシート同期中...');$('sync').textContent='同期中';try{const [a,b,c,d]=await Promise.all([getText(URLS.y2025),getText(URLS.y2026),getText(URLS.schedule),getText(URLS.anime).catch(()=>'')]);buildTracks(a,b);if(d)buildAnime(d);schedules={};csv(c).slice(1).forEach(r=>{if(!r[0]||!r[1])return;const p=String(r[0]).replace(/-/g,'/').split('/');const y=p.length===3?p[0]:'2026',m=p[p.length-2]?.padStart(2,'0'),dd=p[p.length-1]?.padStart(2,'0');if(m&&dd)schedules[`${y}/${m}/${dd}`]=String(r[1]).trim()});localStorage.setItem('tracks',JSON.stringify(tracks));localStorage.setItem('schedules',JSON.stringify(schedules));$('sync').textContent='同期完了'}catch(e){console.error(e);tracks=JSON.parse(localStorage.getItem('tracks')||'[]');animeLinks=dedupeAnime(JSON.parse(localStorage.getItem('animeLinks')||'[]'));schedules=JSON.parse(localStorage.getItem('schedules')||'{}');if(!tracks.length)tracks=[{year:'2026',title:'プラネタリア',artist:'フジファブリック',rawReg:'07/01',rawRem:'Active',regDate:'2026/07/01',removedDate:'Active',days:2,img:'',link:'#',sourceIndex:999}];rebuildMasters();$('sync').textContent='キャッシュ'}finally{showLoad(false);renderAll();fetchAnimeImagesOnce()}}
function switchScene(scene){document.body.className=`theme-${scene} pb-16`;document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));$(`scene-${scene}`)?.classList.add('active');['home','timeline','table','ranking','anime'].forEach(n=>{const t=$(`tab-${n}`);if(t)t.className='btn px-4 py-2 rounded-lg text-zinc-400 whitespace-nowrap'});$(`tab-${scene}`)?.classList.add('tab-active');if(scene==='timeline'){timelineLimit=24;renderTimeline()}if(scene==='table')renderTable();if(scene==='ranking')renderRanking();if(scene==='anime')renderAnime();if(scene==='library')renderLibrary();scrollTo({top:0,behavior:'smooth'})}function renderStats(){const total=masters.length,active=tracks.filter(t=>t.removedDate==='Active').length,avg=total?Math.round(masters.reduce((s,t)=>s+t.totalDays,0)/total):0,longest=[...masters].sort((a,b)=>b.totalDays-a.totalDays)[0];$('statTotal').textContent=total;$('statActive').textContent=active;$('statAvg').innerHTML=`${avg}<span class="text-xs text-zinc-400 font-sans">日</span>`;if(longest){$('statLongest').textContent=longest.title;$('statLongestDays').textContent=`${longest.totalDays}日`;$('longestCard').onclick=()=>openModal(longest.title,longest.artist)}}function renderAll(){renderTimeline();renderTable();renderRanking();renderAnime();renderLibrary();renderRecs();renderHomeAnime();renderHomeMonthStats();updateOut()}function sortNewest(a,b){const d=(parseDate(b.regDate)||0)-(parseDate(a.regDate)||0);return d||((b.sourceIndex||0)-(a.sourceIndex||0))}function sortOldest(a,b){const d=(parseDate(a.regDate)||0)-(parseDate(b.regDate)||0);return d||((a.sourceIndex||0)-(b.sourceIndex||0))}
function renderTimeline(){const q=norm($('timelineSearch').value);const all=tracks.filter(t=>!q||norm(t.title).includes(q)||norm(t.artist).includes(q)||getAnime(t.title,t.artist).some(a=>norm(a.anime).includes(q))).sort(sortNewest);const list=all.slice(0,timelineLimit);$('timelineList').innerHTML=list.map((t,i)=>{const an=getAnime(t.title,t.artist)[0];return `<div class="card item-in p-4 rounded-xl flex items-center gap-3 cursor-pointer border-rose-500/10" style="animation-delay:${Math.min(i,8)*25}ms" data-song-title="${esc(t.title)}" data-song-artist="${esc(t.artist)}"><div class="w-12 h-12 rounded-xl bg-zinc-950 border border-zinc-900 flex flex-col items-center overflow-hidden flex-shrink-0"><div class="w-full bg-pink-500 text-[8px] text-center text-slate-950 font-black">${t.year}</div><div class="font-digital text-[10px] text-pink-400 mt-1">${t.rawReg||'--'}</div></div>${cover(t.img)}<div class="flex-grow"><h4 class="text-xs font-bold truncate">${esc(t.title)}</h4><p class="text-[11px] text-zinc-400 truncate">${esc(t.artist)}${an?` / ${esc(an.anime)}`:''}</p></div><span class="text-[11px] font-digital text-zinc-400 flex-shrink-0">${t.days}日</span><span class="text-[9px] font-bold ${t.removedDate==='Active'?'text-emerald-400':'text-zinc-400'} flex-shrink-0">${t.removedDate==='Active'?'Active':'OUT'}</span></div>`}).join('')||`<p class="text-xs text-zinc-500 text-center py-8 font-bold">該当なし</p>`;$('timelineMore').classList.toggle('hidden',all.length<=timelineLimit);$('timelineMore').textContent=`もっと見る ${Math.min(24,all.length-timelineLimit)}件`}function monthMatches(t){return monthFilter==='all'||(t.rawReg||'').split('/')[0]===monthFilter}function yearMatches(t){return yearFilter==='all'||t.year===yearFilter}function getMonthStats(baseTracks){const map={};baseTracks.forEach(t=>{if(!t.rawReg)return;const m=(t.rawReg||'').split('/')[0];if(!m)return;const id=`${t.year}/${m}`;if(!map[id])map[id]={id,year:t.year,month:m,count:0,totalDays:0,longest:null};map[id].count++;map[id].totalDays+=t.days;if(!map[id].longest||t.days>map[id].longest.days)map[id].longest=t});return Object.values(map).sort((a,b)=>b.id.localeCompare(a.id)).map(s=>({...s,avg:s.count?Math.round(s.totalDays/s.count):0}))}function renderHomeMonthStats(){const stats=getMonthStats(tracks).slice(0,4);$('homeMonthStats').innerHTML=stats.map(s=>`<button class="btn card p-3 rounded-xl text-left border-cyan-500/15" data-month-jump="${s.year}|||${s.month}"><p class="text-[10px] text-cyan-300 font-black">${s.year}/${parseInt(s.month)}</p><p class="font-digital text-xl text-white font-black">${s.count}<span class="text-[10px] text-zinc-500 font-sans">曲</span></p><p class="text-[10px] text-purple-300">平均 ${s.avg}日</p></button>`).join('')||`<p class="text-xs text-zinc-500">月別統計はまだありません。</p>`}function renderMonthlyStats(list){const box=$('monthlyStats');const stats=getMonthStats(yearFilter==='all'?tracks:tracks.filter(t=>t.year===yearFilter));if(monthFilter!=='all'){const selected=list;const count=selected.length,avg=count?Math.round(selected.reduce((s,t)=>s+t.days,0)/count):0,max=count?[...selected].sort((a,b)=>b.days-a.days)[0]:null;box.innerHTML=`<p class="text-[10px] text-cyan-300 font-black tracking-widest">MONTHLY STATS</p><div class="grid grid-cols-3 gap-3 mt-3 text-center"><div><p class="font-digital text-2xl text-white font-black">${count}</p><p class="text-[10px] text-zinc-500">登録数</p></div><div><p class="font-digital text-2xl text-purple-300 font-black">${avg}</p><p class="text-[10px] text-zinc-500">平均日数</p></div><div><p class="font-digital text-2xl text-amber-300 font-black">${max?max.days:'--'}</p><p class="text-[10px] text-zinc-500">最長日数</p></div></div>${max?`<button class="btn mt-3 w-full text-left bg-black/20 border border-zinc-800 rounded-xl p-3" data-song-title="${esc(max.title)}" data-song-artist="${esc(max.artist)}"><p class="text-[10px] text-amber-300 font-bold">最長曲</p><p class="text-sm font-black truncate">${esc(max.title)}</p><p class="text-[11px] text-zinc-400 truncate">${esc(max.artist)}</p></button>`:''}`;return}box.innerHTML=`<p class="text-[10px] text-cyan-300 font-black tracking-widest">MONTHLY STATS</p><div class="rank-scroll mt-3">${stats.slice(0,12).map(s=>`<button class="btn rank-panel card p-4 rounded-xl text-left border-cyan-500/15" data-month-jump="${s.year}|||${s.month}"><p class="text-xs text-cyan-300 font-bold">${s.year}/${parseInt(s.month)}</p><div class="grid grid-cols-2 gap-3 mt-3"><div><p class="font-digital text-3xl font-black">${s.count}</p><p class="text-[10px] text-zinc-500">登録数</p></div><div><p class="font-digital text-3xl font-black text-purple-300">${s.avg}</p><p class="text-[10px] text-zinc-500">平均日数</p></div></div><p class="text-[10px] text-amber-300 mt-2 truncate">最長: ${esc(s.longest?.title||'--')} / ${s.longest?.days||'--'}日</p></button>`).join('')}</div>`}function renderMonthlyBest(list){const box=$('monthlyBest');if(monthFilter==='all'||!list.length){box.classList.add('hidden');box.innerHTML='';return}const map={};list.forEach(t=>{const k=songKey(t.title,t.artist);if(!map[k])map[k]={title:t.title,artist:t.artist,days:0,img:t.img};map[k].days+=t.days});const best=Object.values(map).sort((a,b)=>b.days-a.days)[0];box.classList.remove('hidden');box.innerHTML=`<div class="flex items-center gap-4 cursor-pointer" data-song-title="${esc(best.title)}" data-song-artist="${esc(best.artist)}">${cover(best.img)}<div class="flex-grow"><p class="text-[10px] text-amber-300 font-black tracking-widest">この月のベストソング</p><h4 class="text-xl font-black truncate">${esc(best.title)}</h4><p class="text-xs text-zinc-300 truncate">${esc(best.artist)}</p></div><div class="text-right"><p class="font-digital text-2xl text-amber-300 font-black">${best.days}</p><p class="text-[10px] text-zinc-500">days</p></div></div>`}function renderMonthButtons(){const months=new Set();tracks.forEach(t=>{if(!yearMatches(t))return;const m=(t.rawReg||'').split('/')[0];if(m)months.add(m)});$('monthButtons').innerHTML=`<button class="monthBtn ${monthFilter==='all'?'chip chip-on':'chip'}" data-month="all">ALL</button>`+[...months].sort().map(m=>`<button class="monthBtn ${monthFilter===m?'chip chip-on':'chip'}" data-month="${m}">${parseInt(m)}</button>`).join('')}function renderTable(){document.querySelectorAll('.yearBtn').forEach(b=>b.className=`yearBtn ${yearFilter===b.dataset.year?'chip chip-on':'chip'}`);document.querySelectorAll('.sortBtn').forEach(b=>b.className=`sortBtn ${sortMode===b.dataset.sort?'chip chip-on':'chip'}`);renderMonthButtons();let list=tracks.filter(t=>yearMatches(t)&&monthMatches(t));renderMonthlyStats(list);renderMonthlyBest(list);if(sortMode==='oldest')list.sort(sortOldest);else if(sortMode==='days')list.sort((a,b)=>b.days-a.days||sortNewest(a,b));else if(sortMode==='reverse')list.sort(sortNewest).reverse();else list.sort(sortNewest);$('tableBody').innerHTML=list.map(t=>`<tr class="border-b border-zinc-900 cursor-pointer hover:bg-purple-950/20" data-song-title="${esc(t.title)}" data-song-artist="${esc(t.artist)}"><td class="p-2.5 text-zinc-500">${t.year.slice(2)}</td><td class="p-2.5 font-bold truncate">${esc(t.title)}</td><td class="p-2.5 text-zinc-400 truncate">${esc(t.artist)}</td><td class="p-2.5 text-zinc-400">${t.rawReg}</td><td class="p-2.5 text-zinc-400">${t.removedDate==='Active'?'<span class="text-emerald-400 font-bold">Active</span>':t.rawRem}</td><td class="p-2.5 text-purple-400 font-bold">${t.days}日</td></tr>`).join('')||`<tr><td colspan="6" class="p-8 text-center text-zinc-500 font-bold">データなし</td></tr>`}
function rankItem(i,title,value,sub,k){return `<div class="bg-black/20 p-2 rounded border border-zinc-900 text-xs ${k?'cursor-pointer hover:bg-zinc-900/60':''}" ${k?`data-song-title="${esc(k.title)}" data-song-artist="${esc(k.artist)}"`:''}><div class="flex justify-between gap-1"><p class="font-bold truncate">${i+1}. ${title}</p><span class="font-digital text-amber-400 flex-shrink-0">${value}</span></div>${sub?`<p class="text-[10px] text-zinc-500 truncate">${sub}</p>`:''}</div>`}function rankData(kind,year){const list=year==='all'?[...tracks]:tracks.filter(t=>t.year===year);if(kind==='song'){const m={};list.forEach(t=>{const k=songKey(t.title,t.artist);if(!m[k])m[k]={title:t.title,artist:t.artist,days:0};m[k].days+=t.days});return Object.values(m).sort((a,b)=>b.days-a.days).slice(0,5).map((s,i)=>rankItem(i,esc(s.title),`${s.days}日`,esc(s.artist),s)).join('')}if(kind==='artist'){const m={};list.forEach(t=>m[t.artist]=(m[t.artist]||0)+1);return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,5).map((a,i)=>rankItem(i,esc(a[0]),`${a[1]}曲`,'')).join('')}const m={};list.forEach(t=>{const k=songKey(t.title,t.artist);if(!m[k])m[k]={title:t.title,artist:t.artist,count:0};m[k].count++});return Object.values(m).sort((a,b)=>b.count-a.count).slice(0,5).map((s,i)=>rankItem(i,esc(s.title),`${s.count}回`,esc(s.artist),s)).join('')}function rankSection(title,kind,color){return `<div class="space-y-3"><h4 class="text-lg font-black ${color}">${title}</h4><div class="rank-scroll"><div class="rank-panel card p-4 rounded-xl border-amber-500/20"><p class="text-xs text-amber-300 font-bold mb-2">累計</p>${rankData(kind,'all')}</div><div class="rank-panel card p-4 rounded-xl border-sky-500/20"><p class="text-xs text-sky-300 font-bold mb-2">2026</p>${rankData(kind,'2026')}</div><div class="rank-panel card p-4 rounded-xl border-purple-500/20"><p class="text-xs text-purple-300 font-bold mb-2">2025</p>${rankData(kind,'2025')}</div></div></div>`}function renderRanking(){$('rankingArea').innerHTML=rankSection('曲日数','song','text-orange-300')+rankSection('アーティスト','artist','text-amber-300')+rankSection('リピート','repeat','text-yellow-300')}
function animeCard(g){const best=[...g.items].sort((a,b)=>b.totalDays-a.totalDays)[0];return `<button class="btn text-left card rounded-xl overflow-hidden border-sky-500/20" data-anime-filter="${esc(g.anime)}">${animePoster(g.anime)}<div class="p-2"><p class="anime-title text-[11px] font-black truncate">${esc(g.anime)}</p><p class="text-[9px] text-zinc-500 truncate">${g.items.length}曲 / ${g.days}日</p><p class="hide-mobile text-[9px] text-sky-300 truncate">${esc(best?.title||'--')}</p></div></button>`}function renderAnime(){const q=norm($('animeSearch').value),type=$('animeType').value,groups=animeGroups();const rows=groups.flatMap(g=>g.items).filter(a=>(type==='all'||a.type===type)&&(!q||norm(a.anime).includes(q)||norm(a.title).includes(q)||norm(a.artist).includes(q)||norm(a.season).includes(q)));$('animeSummary').innerHTML=`<div class="bg-sky-500/10 rounded-xl p-3 border border-sky-500/20"><p class="font-digital text-lg text-sky-300">${groups.length}</p><p class="text-[10px] text-zinc-500">作品</p></div><div class="bg-cyan-500/10 rounded-xl p-3 border border-cyan-500/20"><p class="font-digital text-lg text-cyan-300">${animeLinks.length}</p><p class="text-[10px] text-zinc-500">紐づけ</p></div><div class="bg-indigo-500/10 rounded-xl p-3 border border-indigo-500/20"><p class="font-digital text-lg text-indigo-300">${animeLinks.filter(a=>a.type==='OP').length}</p><p class="text-[10px] text-zinc-500">OP</p></div>`;$('animeSongRank').innerHTML=rows.sort((a,b)=>b.totalDays-a.totalDays).slice(0,5).map((a,i)=>rankItem(i,esc(a.title),`${a.totalDays}日`,`${esc(a.anime)} / ${esc(a.type||'')}`,{title:a.title,artist:a.artist})).join('')||`<p class="text-xs text-zinc-500">該当なし</p>`;$('animeWorkRank').innerHTML=groups.slice(0,9).map(animeCard).join('');$('animeResults').innerHTML=q?rows.slice(0,9).map(a=>`<div class="card rounded-xl p-2 cursor-pointer" data-song-title="${esc(a.title)}" data-song-artist="${esc(a.artist)}"><p class="text-[11px] font-bold truncate">${esc(a.title)}</p><p class="text-[9px] text-zinc-500 truncate">${esc(a.anime)} / ${esc(a.type||'')}</p></div>`).join(''):''}function renderLibrary(){const q=norm($('librarySearch').value);$('libraryList').innerHTML=animeGroups().filter(g=>!q||norm(g.anime).includes(q)).map(animeCard).join('')||`<p class="text-xs text-zinc-500">該当なし</p>`}function renderRecs(){const pool=masters.filter(m=>m.totalDays>=5&&m.history.every(h=>h.removedDate!=='Active')).sort(()=>Math.random()-.5).slice(0,3);$('recommendSongs').innerHTML=pool.map(m=>`<div class="card p-3 rounded-xl flex items-center gap-3 cursor-pointer" data-song-title="${esc(m.title)}" data-song-artist="${esc(m.artist)}">${cover(m.img)}<div><h4 class="text-xs font-bold truncate">${esc(m.title)}</h4><p class="text-[10px] text-zinc-400 truncate">${esc(m.artist)}</p></div><span class="ml-auto text-[9px] font-digital text-indigo-300">${m.totalDays}日</span></div>`).join('')||`<p class="text-xs text-zinc-500 text-center py-4">おすすめの過去曲はまだありません。</p>`}function renderHomeAnime(){$('homeAnime').innerHTML=animeGroups().slice(0,2).map(animeCard).join('')||`<p class="text-xs text-zinc-500">アニメ情報が増えると表示されます。</p>`}function updateOut(){const y=$('inputYear').value;$('inputOut').innerHTML='<option value="">OUTなし</option>'+tracks.filter(t=>t.year===y&&t.removedDate==='Active').map(t=>`<option value="${esc(t.title+'|||'+t.artist)}">OUT: ${esc(t.title)} / ${esc(t.artist)}</option>`).join('')}
function openModal(title,artist){const m=masters.find(x=>songKey(x.title,x.artist)===songKey(title,artist))||masters.find(x=>norm(x.title)===norm(title));if(!m)return alert('詳細を開けませんでした。');const anime=getAnime(m.title,m.artist);$('modalContent').innerHTML=`<div class="flex items-center gap-4 pr-10">${cover(m.img)}<div><h3 class="text-lg font-black truncate">${esc(m.title)}</h3><p class="text-sm text-zinc-400 truncate">${esc(m.artist)}</p></div></div>${play(m.link)}<div class="grid grid-cols-2 gap-3 text-xs"><div class="bg-indigo-500/10 rounded-xl p-3 border border-indigo-500/20"><p class="text-indigo-300 font-bold">総滞在</p><p class="font-digital text-xl text-indigo-200">${m.totalDays}日</p></div><div class="bg-amber-500/10 rounded-xl p-3 border border-amber-500/20"><p class="text-amber-300 font-bold">登録回数</p><p class="font-digital text-xl text-amber-200">${m.history.length}回</p></div></div><div class="space-y-2"><div class="flex justify-between items-center"><p class="text-[10px] text-sky-400 font-bold">Anime</p><button id="animeAddBtn" class="btn text-[10px] px-2 py-0.5 rounded-md bg-sky-500/10 text-sky-300 border border-sky-500/20">追加</button></div><div class="space-y-2">${anime.length?anime.map(a=>`<div class="bg-sky-500/10 border border-sky-500/20 rounded-xl p-3 text-xs"><p class="text-sky-200 font-black">${esc(a.anime)}</p><p class="text-zinc-400 mt-0.5">${esc(a.season||'Season未登録')} / ${esc(a.type||'Type未登録')}</p></div>`).join(''):`<p class="text-xs text-zinc-500 bg-zinc-950/50 border border-zinc-900 rounded-xl p-3">アニメ情報は未登録です。</p>`}</div><div id="animeForm"></div></div><div class="space-y-2"><p class="text-[10px] text-zinc-500 font-bold">History</p>${m.history.map(h=>`<div class="flex justify-between bg-black/30 rounded-lg p-2 border border-zinc-900 text-xs"><span>${h.regDate}</span><span>→</span><span class="${h.removedDate==='Active'?'text-emerald-400':'text-zinc-300'}">${h.removedDate}</span><span class="text-purple-300">${h.days}日</span></div>`).join('')}</div>`;$('modal').classList.remove('opacity-0','pointer-events-none');$('modalBox').classList.remove('modal-show');void $('modalBox').offsetWidth;$('modalBox').classList.add('modal-show');$('animeAddBtn').onclick=()=>showAnimeForm(m.title,m.artist)}function closeModal(){$('modal').classList.add('opacity-0','pointer-events-none')}function showAnimeForm(title,artist){$('animeForm').innerHTML=`<div class="mt-2 space-y-2 bg-zinc-950/70 border border-sky-500/20 rounded-xl p-3 text-xs"><input id="animeTitle" value="${esc(title)}" type="hidden"><input id="animeArtist" value="${esc(artist)}" type="hidden"><input id="animeName" placeholder="Anime" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-white"><input id="animeSeason" placeholder="Season1 / Season1-1" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-white"><select id="animeTypeInput" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-white"><option>OP</option><option>ED</option><option>主題歌</option><option>挿入歌</option><option>キャラソン</option><option>その他</option></select><button id="animeSave" class="btn w-full bg-sky-500 text-slate-950 font-black rounded-lg py-2">保存</button><p id="animeSaveStatus" class="text-[10px] text-zinc-500"></p></div>`;$('animeSave').onclick=saveAnime}function saveAnime(){const entry={title:$('animeTitle').value,artist:$('animeArtist').value,anime:$('animeName').value.trim(),season:normSeason($('animeSeason').value),type:$('animeTypeInput').value};if(!entry.anime)return alert('アニメ名を入力してください。');if(animeLinks.some(a=>animeKey(a)===animeKey(entry))){$('animeSaveStatus').textContent='同一項目は既に登録済みです。';return}animeLinks=dedupeAnime([...animeLinks,entry]);localStorage.setItem('animeLinks',JSON.stringify(animeLinks));$('animeSaveStatus').textContent='送信中...';fetch(`${GAS_URL}?${new URLSearchParams({action:'addAnime',...entry}).toString()}`,{method:'GET',mode:'cors'}).catch(()=>{}).finally(()=>{openModal(entry.title,entry.artist);renderAll()})}
function searchHistory(){if(!$('historyDate').value)return alert('日付を選択してください。');const target=new Date($('historyDate').value),y=target.getFullYear(),m=String(target.getMonth()+1).padStart(2,'0'),d=String(target.getDate()).padStart(2,'0');$('situation').textContent=schedules[`${y}/${m}/${d}`]||'予定なし（平穏な日常の通学路）';const active=tracks.filter(t=>{const s=parseDate(t.regDate),e=t.removedDate==='Active'?new Date():parseDate(t.removedDate);return s&&e&&s<=target&&target<=e});$('streamArea').classList.remove('hidden');$('historyResults').innerHTML=active.map(t=>`<div class="card p-3 rounded-xl flex items-center gap-3 cursor-pointer" data-song-title="${esc(t.title)}" data-song-artist="${esc(t.artist)}">${cover(t.img)}<div><p class="text-xs font-bold truncate">${esc(t.title)}</p><p class="text-[10px] text-zinc-400 truncate">${esc(t.artist)}</p></div><span class="ml-auto text-indigo-300 font-digital text-xs">${t.days}日</span></div>`).join('')||`<p class="text-xs text-zinc-500 text-center py-6 font-bold">この日にActiveだった曲はありません。</p>`}function randomDate(){const dates=tracks.map(t=>t.regDate).filter(d=>d&&d!=='--');if(!dates.length)return;$('historyDate').value=dates[Math.floor(Math.random()*dates.length)].replaceAll('/','-');searchHistory()}function submitSong(){const year=$('inputYear').value,title=$('inputTitle').value.trim(),artist=$('inputArtist').value.trim(),img=$('inputImg').value.trim(),link=$('inputLink').value.trim(),outTrack=$('inputOut').value;if(!title||!artist)return alert('曲名とアーティスト名は両方入力してください。');const btn=$('songSubmit'),orig=btn.textContent;btn.textContent='送信中...';btn.disabled=true;fetch(`${GAS_URL}?${new URLSearchParams({year,title,artist,img,link,outTrack}).toString()}`,{method:'GET',mode:'cors'}).then(r=>r.json()).then(res=>{if(res.status!=='success')throw new Error(res.message||'登録失敗');const now=new Date(),raw=`${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;tracks.unshift({year,title,artist,days:2,img,link:link||'#',rawReg:raw,rawRem:'Active',regDate:`${year}/${raw}`,removedDate:'Active',sourceIndex:99999});rebuildMasters();localStorage.setItem('tracks',JSON.stringify(tracks));renderAll();alert('新曲を登録しました。')}).catch(e=>alert('送信に失敗しました。\n詳細: '+e.message)).finally(()=>{btn.textContent=orig;btn.disabled=false})}async function fetchAnimeImagesOnce(){if(sessionStorage.getItem('animeImagesDone'))return;sessionStorage.setItem('animeImagesDone','1');const names=animeGroups().map(g=>g.anime).filter(n=>!animeImg[n]).slice(0,4);let changed=false;for(const n of names){try{const r=await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(n)}&limit=1`,{cache:'force-cache'});if(r.ok){const j=await r.json();const u=j?.data?.[0]?.images?.jpg?.image_url;if(u){animeImg[n]=u;changed=true}}}catch(e){}await new Promise(res=>setTimeout(res,700))}if(changed){localStorage.setItem('animeImg',JSON.stringify(animeImg));renderHomeAnime();renderAnime();renderLibrary()}}
function bind(){document.addEventListener('click',e=>{const scene=e.target.closest('[data-scene]');if(scene){switchScene(scene.dataset.scene);return}const jump=e.target.closest('[data-month-jump]');if(jump){const [y,m]=jump.dataset.monthJump.split('|||');yearFilter=y;monthFilter=m;switchScene('table');return}const song=e.target.closest('[data-song-title]');if(song){openModal(song.dataset.songTitle,song.dataset.songArtist);return}const a=e.target.closest('[data-anime-filter]');if(a){$('animeSearch').value=a.dataset.animeFilter;switchScene('anime');renderAnime();return}});$('modalClose').onclick=closeModal;$('modal').addEventListener('click',e=>{if(e.target===$('modal'))closeModal()});$('jumpTop').onclick=()=>scrollTo({top:0,behavior:'smooth'});$('formToggle').onclick=()=>{const b=$('formBox');b.style.maxHeight=(!b.style.maxHeight||b.style.maxHeight==='0px')?b.scrollHeight+'px':'0px'};$('timelineSearch').oninput=()=>{timelineLimit=24;renderTimeline()};$('timelineMore').onclick=()=>{timelineLimit+=24;renderTimeline()};$('animeSearch').oninput=renderAnime;$('animeType').onchange=renderAnime;$('librarySearch').oninput=renderLibrary;$('inputYear').onchange=updateOut;$('historyBtn').onclick=searchHistory;$('randomDate').onclick=randomDate;$('songSubmit').onclick=submitSong;$('webSearch').onclick=()=>{const q=$('timelineSearch').value.trim();if(q)window.open(`https://www.google.com/search?q=${encodeURIComponent(q+' 曲')}`,'_blank')};document.querySelectorAll('.yearBtn').forEach(b=>b.onclick=()=>{yearFilter=b.dataset.year;monthFilter='all';renderTable()});document.querySelectorAll('.sortBtn').forEach(b=>b.onclick=()=>{sortMode=b.dataset.sort;renderTable()});document.addEventListener('click',e=>{const m=e.target.closest('.monthBtn');if(m){monthFilter=m.dataset.month;renderTable()}});window.addEventListener('scroll',()=>$('jumpTop').classList.toggle('show',scrollY>600))}
document.addEventListener('DOMContentLoaded',()=>{bind();switchScene('home');init()});
</script>
