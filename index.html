<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f5f5f7;
}
header{
  padding:30px;
  background:linear-gradient(135deg,#ff2d55,#ff9500);
  color:white;
}
h1{margin:0}
nav{
  display:flex;
  gap:8px;
  padding:10px;
  overflow:auto;
  background:white;
}
button{
  border:none;
  padding:8px 12px;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
}
button.active{
  background:#ff2d55;
  color:white;
}
.section{display:none;padding:20px}
.section.active{display:block}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:white;
  border-radius:20px;
  padding:15px;
  position:relative;
}

.rank{
  position:absolute;
  top:10px;
  right:15px;
  font-size:28px;
  font-weight:900;
  color:#ff2d55;
}

.rank.top1{font-size:42px;color:#ffcc00;}
.rank.top2{font-size:36px;color:#c0c0c0;}
.rank.top3{font-size:32px;color:#cd7f32;}

.cover{
  width:100%;
  aspect-ratio:1;
  border-radius:15px;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  margin-bottom:10px;
}

.title{font-weight:700}
.artist{color:#666}

.days{color:#ff2d55;font-weight:700;margin-top:6px}

.tag{
  display:inline-block;
  background:#eee;
  padding:4px 8px;
  border-radius:10px;
  font-size:12px;
  margin:3px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}
td,th{
  padding:8px;
  border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<header>
<h1>Playlist</h1>
</header>

<nav>
<button onclick="show('2025')" class="active">2025</button>
<button onclick="show('2026')">2026</button>
<button onclick="show('rankAll')">ランキング</button>
<button onclick="show('cards')">カード</button>
</nav>

<div id="2025" class="section active"></div>
<div id="2026" class="section"></div>
<div id="rankAll" class="section"></div>
<div id="cards" class="section"></div>

<script>
const url="https://docs.google.com/spreadsheets/d/1xGzpQzVBjp40YdD1y5tkdy3AR6XwJNypWOUQkEgzRTw/gviz/tq?tqx=out:csv&sheet=all";

let data=[];

function show(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

function tagDetect(text){
  let t=[];
  if(text.includes("ア"))t.push("アニメ");
  if(text.includes("週"))t.push("週間");
  if(text.includes("カ"))t.push("カラオケ");
  if(text.includes("リ"))t.push("リピート");
  return t;
}

function makeCard(s,i){
  let cls="";
  if(i==0)cls="top1";
  if(i==1)cls="top2";
  if(i==2)cls="top3";

  return `
  <div class="card">
    ${i!=null?`<div class="rank ${cls}">#${i+1}</div>`:""}
    <div class="cover">${s.title[0]}</div>
    <div class="title">${s.title}</div>
    <div class="artist">${s.artist}</div>
    <div class="days">${s.days}日</div>
    <div>${s.tags.map(x=>`<span class="tag">${x}</span>`).join("")}</div>
  </div>
  `;
}

fetch(url)
.then(r=>r.text())
.then(csv=>{
  let rows=Papa.parse(csv).data;

  data=rows.map(r=>({
    title:r[0],
    artist:r[1],
    start:r[6],
    end:r[7],
    days:parseInt(r[8])||0,
    tags:tagDetect(r.join(""))
  })).filter(x=>x.title);

  let y2025=data.filter(x=>x.start?.includes("2025"));
  let y2026=data.filter(x=>x.start?.includes("2026"));

  document.getElementById("2025").innerHTML=makeTable(y2025);
  document.getElementById("2026").innerHTML=makeTable(y2026);

  let rank=[...data].sort((a,b)=>b.days-a.days);
  document.getElementById("rankAll").innerHTML=
    `<div class="grid">${rank.map((s,i)=>makeCard(s,i)).join("")}</div>`;

  document.getElementById("cards").innerHTML=
    `<div class="grid">${data.map(s=>makeCard(s)).join("")}</div>`;
});

function makeTable(arr){
  return `
  <table>
  <tr><th>曲</th><th>アーティスト</th><th>日数</th></tr>
  ${arr.map(s=>`<tr><td>${s.title}</td><td>${s.artist}</td><td>${s.days}</td></tr>`).join("")}
  </table>
  `;
}

</script>

</body>
</html>
