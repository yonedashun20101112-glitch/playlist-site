<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Experience Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+JP:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #0a0a0c;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* サイバー感のある動く背景グラデーション */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -200px;
            left: -200px;
            z-index: -1;
            animation: floating 10s infinite alternate ease-in-out;
        }
        .bg-glow-2 {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -100px;
            right: -100px;
            z-index: -1;
            animation: floating 12s infinite alternate-reverse ease-in-out;
        }

        @keyframes floating {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* 近未来的な数字のフォント */
        .font-digital {
            font-family: 'Orbitron', sans-serif;
        }

        /* カードのホバーアニメーション */
        .music-card {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px rgba(255, 255, 255, 0.05) solid;
        }
        .music-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.3);
        }

        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0c; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #6366f1; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="max-w-6xl mx-auto px-4 py-8">
        
        <header class="mb-12 text-center md:text-left flex flex-col md:flex-row justify-between items-center border-b border-zinc-800 pb-6 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">
                    SOUND TRACKS OF MY LIFE
                </h1>
                <p class="text-zinc-400 text-sm mt-2">75分の通学路、登録と抹消のクロニクル</p>
            </div>
            <div class="bg-zinc-900/80 border border-zinc-800 px-4 py-2 rounded-full text-sm flex items-center gap-3 shadow-lg">
                <span class="w-2 height w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                <span class="text-zinc-300 font-medium">Current Playlist: <span class="font-digital text-indigo-400 text-base">~75 min</span></span>
            </div>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div class="bg-zinc-900/40 p-4 rounded-2xl border border-zinc-800/80 backdrop-blur-md">
                <p class="text-xs text-zinc-400 uppercase tracking-wider font-medium">総登録楽曲</p>
                <p class="text-3xl font-bold font-digital text-white mt-1" id="stat-total">--</p>
                <span class="text-[10px] text-indigo-400"><i class="fa-solid fa-music mr-1"></i> 2025-2026 累計</span>
            </div>
            <div class="bg-zinc-900/40 p-4 rounded-2xl border border-zinc-800/80 backdrop-blur-md">
                <p class="text-xs text-zinc-400 uppercase tracking-wider font-medium">今月の新入曲</p>
                <p class="text-3xl font-bold font-digital text-pink-500 mt-1" id="stat-this-month">--</p>
                <span class="text-[10px] text-zinc-500">先月比の勢い</span>
            </div>
            <div class="bg-zinc-900/40 p-4 rounded-2xl border border-zinc-800/80 backdrop-blur-md">
                <p class="text-xs text-zinc-400 uppercase tracking-wider font-medium">平均滞在期間</p>
                <p class="text-3xl font-bold font-digital text-purple-400 mt-1" id="stat-avg-days">-- <span class="text-sm text-zinc-400">Days</span></p>
                <span class="text-[10px] text-purple-400">お気に入り度の平均</span>
            </div>
            <div class="bg-zinc-900/40 p-4 rounded-2xl border border-zinc-800/80 backdrop-blur-md">
                <p class="text-xs text-zinc-400 uppercase tracking-wider font-medium">最長ヘビロテ曲</p>
                <p class="text-sm font-bold text-zinc-200 mt-2 truncate" id="stat-longest-track">読み込み中...</p>
                <span class="text-[10px] text-zinc-500" id="stat-longest-artist">Artist</span>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-8">
                <div class="bg-zinc-950/60 p-6 rounded-3xl border border-zinc-800/60">
                    <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-crown text-amber-400"></i> Top Artists
                    </h3>
                    <div class="space-y-3" id="artist-ranking-list">
                        <p class="text-zinc-500 text-xs text-center py-4">データ集計中...</p>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-indigo-950/40 to-zinc-950 p-6 rounded-3xl border border-indigo-500/20">
                    <h3 class="text-lg font-bold text-white mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-star text-indigo-400"></i> 最近の週間BEST
                    </h3>
                    <div id="weekly-best-card" class="text-center py-2">
                        <p class="text-xs text-zinc-400" id="best-week">WEEK --</p>
                        <p class="text-xl font-bold text-white mt-1" id="best-title">曲名</p>
                        <p class="text-sm text-indigo-300" id="best-artist">アーティスト</p>
                        <div class="inline-block bg-indigo-500/20 border border-indigo-500/30 px-3 py-1 rounded-full text-xs font-digital text-indigo-300 mt-3" id="best-score">
                            --/100 Score
                        </div>
                        <p class="text-xs text-zinc-400 mt-2 italic" id="best-event">「イベント情報」</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-timeline text-pink-500"></i> 楽曲入れ替えタイムライン
                    </h3>
                    <div class="flex gap-2 text-xs bg-zinc-900 p-1 rounded-lg border border-zinc-800">
                        <button class="px-3 py-1 rounded bg-indigo-600 text-white font-medium">All</button>
                    </div>
                </div>

                <div class="space-y-3" id="tracks-container">
                    <div class="text-center text-zinc-500 py-12">データを読み込んでいます...</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // あなたのスプレッドシート（CSV）のURL、またはデータをここに連動させます。
        // 今回は動作確認用に、添付していただいたデータをベースにしたサンプルを埋め込んでいます。
        const sampleTracks = [
            {
                title: "カーテンコール",
                artist: "優里",
                regDate: "2026/01/01",
                removedDate: "2026/01/30",
                days: 29,
                img: "https://is1-ssl.mzstatic.com/image/thumb/Music221/v4/4a/db/34/4adb34dd-5c2a-7fd8-1d48-1c57b066b002/4547366694093.jpg/120x120bb.webp",
                link: "https://music.apple.com/jp/album/%E3%82%AB%E3%83%BC%E3%83%86%E3%83%B3%E3%82%B3%E3%83%BC%E3%83%AB/1754899923?i=1754899924"
            },
            {
                title: "シトラス",
                artist: "Kiwano",
                regDate: "2025/04/04",
                removedDate: "2025/04/13",
                days: 9,
                img: "https://is1-ssl.mzstatic.com/image/thumb/Music126/v4/a4/05/06/a4050604-a670-4182-402d-8d1e1133d0e2/4525853447896.jpg/120x120bb.webp",
                link: "https://music.apple.com/jp/album/%E3%82%B7%E3%83%88%E3%83%A9%E3%82%B9/1698271562?i=1698271563"
            },
            {
                title: "青にほどける",
                artist: "KESUKE",
                regDate: "2026/06/16",
                removedDate: "現在登録中",
                days: "-",
                img: "https://is1-ssl.mzstatic.com/image/thumb/Music221/v4/69/bf/e2/69bfe23e-88d1-1b5f-375e-e9b8cc87b230/artwork.jpg/120x120bb.webp",
                link: "https://music.apple.com/jp/album/%E9%9D%92%E3%81%AB%E3%81%BB%E3%81%A9%E3%81%91%E3%82%8B/6771702822?i=6771702823"
            }
        ];

        // 画面に曲の一覧を描画する関数
        function renderTracks(tracks) {
            const container = document.getElementById('tracks-container');
            container.innerHTML = '';

            tracks.forEach(track => {
                // カバー画像がない場合のダミー画像
                const imgUrl = track.img || 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=120&auto=format&fit=crop';
                const removeText = track.removedDate === "現在登録中" || !track.removedDate ? 
                    `<span class="text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded text-[10px]">Active</span>` : 
                    `<span class="text-zinc-500">${track.removedDate} 抹消</span>`;

                container.innerHTML += `
                    <div class="music-card p-4 rounded-2xl flex items-center justify-between gap-4">
                        <div class="flex items-center gap-4 min-w-0">
                            <img src="${imgUrl}" alt="cover" class="w-14 h-14 rounded-xl object-cover shadow-md border border-zinc-800 flex-shrink-0">
                            <div class="min-w-0">
                                <h4 class="text-white font-bold text-sm md:text-base truncate">${track.title}</h4>
                                <p class="text-zinc-400 text-xs md:text-sm truncate">${track.artist}</p>
                                <div class="flex items-center gap-2 mt-1 text-[11px] text-zinc-500">
                                    <span>${track.regDate} 登録</span>
                                    <span>•</span>
                                    <span>${removeText}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-4 flex-shrink-0">
                            <div class="text-right hidden sm:block">
                                <span class="text-xs text-zinc-500 block">滞在</span>
                                <span class="font-digital text-sm ${track.days !== '-' ? 'text-indigo-400' : 'text-emerald-400'}">${track.days} ${track.days !== '-' ? '日' : ''}</span>
                            </div>
                            <a href="${track.link}" target="_blank" class="w-9 h-9 rounded-full bg-zinc-800 hover:bg-pink-600 text-zinc-300 hover:text-white flex items-center justify-center transition-colors shadow-md" title="Apple Musicで聴く">
                                <i class="fa-solid fa-play text-xs ml-0.5"></i>
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        // ダッシュボードの統計数値をセットする（仮）
        document.getElementById('stat-total').innerText = "142";
        document.getElementById('stat-this-month').innerText = "+12";
        document.getElementById('stat-avg-days').innerText = "14.5";
        document.getElementById('stat-longest-track').innerText = "名もなき詩";
        document.getElementById('stat-longest-artist').innerText = "Mr.Children";

        // 週間ベストをセットする（仮）
        document.getElementById('best-week').innerText = "01/01~01/04";
        document.getElementById('best-title').innerText = "パーフェクトデイ";
        document.getElementById('best-artist').innerText = "３１０";
        document.getElementById('best-score').innerText = "98/100 Score";
        document.getElementById('best-event').innerText = "「正月、梅田観光」より";

        // アーティストランキングのセット（仮）
        const topArtists = [
            { name: "RADWIMPS", count: "14回登場" },
            { name: "Official髭男dism", count: "11回登場" },
            { name: "YOASOBI", count: "9回登場" }
        ];
        const rankingContainer = document.getElementById('artist-ranking-list');
        rankingContainer.innerHTML = topArtists.map((artist, index) => `
            <div class="flex justify-between items-center bg-zinc-900/40 p-2.5 rounded-xl border border-zinc-800/40 text-sm">
                <div class="flex items-center gap-3">
                    <span class="font-digital font-bold text-xs ${index === 0 ? 'text-amber-400' : index === 1 ? 'text-zinc-400' : 'text-amber-700'}">0${index+1}</span>
                    <span class="text-zinc-200 font-medium">${artist.name}</span>
                </div>
                <span class="text-xs text-zinc-500">${artist.count}</span>
            </div>
        `).join('');

        // 初回実行
        renderTracks(sampleTracks);
    </script>
</body>
</html>
